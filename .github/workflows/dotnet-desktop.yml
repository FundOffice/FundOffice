name: 发布 .NET 10 WPF 并创建 Release

on:
  workflow_dispatch:    # 手动触发
  push:
    tags:
      - 'v*'            # 打 tag 自动发布

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 必须，否则无法创建 Release

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: 发布所有 WPF/EXE 项目
        run: |
          $publishDir = "./publish"
          $configuration = "Release"
          $runtime = "win-x64"
          $selfContained = $false

          $projects = Get-ChildItem -Recurse -Filter *.csproj | Where-Object {
              $_.Name -notmatch '_'
          }

          foreach ($proj in $projects) {
              $projPath = $proj.FullName
              $projContent = Get-Content $projPath -Raw -Encoding UTF8

              if ($projContent -match '<OutputType>(WinExe|Exe)</OutputType>') {
                  Write-Host "`n=== 发布: $($proj.Name) ===" -ForegroundColor Cyan

                  dotnet publish $projPath `
                      -c $configuration `
                      -r $runtime `
                      --self-contained $selfContained `
                      -o $publishDir `
                      --nologo `
                      /p:WarningLevel=0 `
                      /p:DebugSymbols=false `
                      /p:DebugType=None `
                      /p:UseAppHost=true `
                      /p:RuntimeIdentifier=win-x64

                  if ($LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                  }
              }
          }
        shell: powershell

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: FundOffice-Win-x64
          path: ./publish/

      - name: 打包成单个 ZIP（方便 Release 下载）
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath ./FundOffice-Win-x64.zip -Force
        shell: powershell

      - name: 确定版本号
        id: version
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
              $version = "${{ github.ref_name }}"
              $tag = "${{ github.ref_name }}"
              $isTag = "true"
          } else {
              $version = "dev-build-$(Get-Date -Format 'yyyyMMddHHmm')"
              $tag = "dev"
              $isTag = "false"
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "ISTAG=$isTag" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FundOffice ${{ steps.version.outputs.VERSION }}
          tag_name: ${{ steps.version.outputs.TAG }}
          files: ./FundOffice-Win-x64.zip
          draft: false
          prerelease: ${{ steps.version.outputs.ISTAG != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}