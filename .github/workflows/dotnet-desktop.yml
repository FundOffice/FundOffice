name: publish

on:
  workflow_dispatch:    # 手动触发
  push:
    tags:
      - 'v*'            # 打 tag 自动发布

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: 构建并发布（自动还原 + 正确运行时）
        run: |
          $publishDir = "./publish"
          $configuration = "Release"
          $runtime = "win-x64"
          $selfContained = $false

          # 获取所有合法项目
          $projects = Get-ChildItem -Recurse -Filter *.csproj | Where-Object {
              $_.Name -notmatch '_'
          }

          foreach ($proj in $projects) {
              $projPath = $proj.FullName
              $projContent = Get-Content $projPath -Raw -Encoding UTF8

              # 只发布 EXE/WPF 程序
              if ($projContent -match '<OutputType>(WinExe|Exe)</OutputType>') {
                  Write-Host "`n=== 发布: $($proj.Name) ===" -ForegroundColor Cyan

                  # 关键：发布时自带还原，去掉 --no-restore，强制指定运行时
                  dotnet publish $projPath `
                      -c $configuration `
                      -r $runtime `
                      --self-contained $selfContained `
                      -o $publishDir `
                      --nologo `
                      /p:WarningLevel=0 `
                      /p:DebugSymbols=false `
                      /p:DebugType=None `
                      /p:UseAppHost=true `
                      /p:RuntimeIdentifier=win-x64

                  if ($LASTEXITCODE -ne 0) {
                      exit $LASTEXITCODE
                  }
              }
          }
        shell: powershell

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: FundOffice-Win-x64
          path: ./publish/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: FundOffice ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ./publish/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}